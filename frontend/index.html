<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Livestream Host</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f; color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        #app {
            flex: 1; display: flex; flex-direction: column;
            max-width: 900px; margin: 0 auto; width: 100%; padding: 16px;
        }
        #avatar-container {
            flex: 1; position: relative; border-radius: 16px; overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 300px;
        }
        #live2d-canvas { width: 100%; height: 100%; display: block; }
        #avatar-loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #888; font-size: 14px; text-align: center;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #333;
            border-top: 3px solid #60a5fa; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #speech-bubble {
            position: absolute; bottom: 16px; left: 16px; right: 16px;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 12px 16px; font-size: 16px; line-height: 1.5;
            opacity: 0; transform: translateY(10px); transition: opacity 0.3s, transform 0.3s;
            max-height: 120px; overflow-y: auto; pointer-events: none;
        }
        #speech-bubble.visible { opacity: 1; transform: translateY(0); }
        #status {
            position: absolute; top: 12px; left: 12px;
            display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; transition: background 0.3s; }
        .dot.connected { background: #4ade80; }
        .dot.thinking { background: #facc15; animation: pulse 1s infinite; }
        .dot.speaking { background: #60a5fa; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        #debug {
            position: absolute; top: 12px; right: 12px;
            font-size: 11px; color: #666; text-align: right; font-family: monospace;
        }
        #debug div { margin-bottom: 2px; }
        #emotion-badge { position: absolute; top: 40px; left: 12px; font-size: 20px; }
        #chat-area { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
        #chat-log {
            height: 120px; overflow-y: auto; padding: 8px 12px;
            background: #111118; border-radius: 12px; font-size: 13px;
        }
        .chat-msg { margin-bottom: 6px; line-height: 1.4; }
        .chat-msg .user { color: #60a5fa; font-weight: 600; }
        .chat-msg .ai { color: #c084fc; font-weight: 600; }
        .chat-msg .text { color: #ccc; }
        .chat-msg .etag { font-size: 11px; color: #888; margin-left: 4px; }
        #input-area { display: flex; gap: 8px; }
        #chat-input {
            flex: 1; padding: 12px 16px; background: #111118;
            border: 1px solid #222; border-radius: 12px;
            color: #e0e0e0; font-size: 15px; outline: none;
        }
        #chat-input:focus { border-color: #60a5fa; }
        #chat-input::placeholder { color: #555; }
        #chat-input:disabled { opacity: 0.5; }
        #send-btn {
            padding: 12px 20px; background: #60a5fa; color: #000;
            border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
        }
        #send-btn:hover { background: #93c5fd; }
        #send-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        #error-msg {
            position: absolute; bottom: 60px; left: 16px; right: 16px;
            background: rgba(200,0,0,0.8); border-radius: 8px; padding: 8px 12px;
            font-size: 12px; display: none; font-family: monospace; word-break: break-all;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="avatar-container">
            <canvas id="live2d-canvas"></canvas>
            <div id="avatar-loading"><div class="spinner"></div>Loading avatar...</div>
            <div id="status"><div class="dot" id="status-dot"></div><span id="status-text">Connecting...</span></div>
            <div id="emotion-badge">😐</div>
            <div id="debug">
                <div>LLM: <span id="dbg-llm">-</span>ms</div>
                <div>TTS: <span id="dbg-tts">-</span>ms</div>
                <div>FPS: <span id="dbg-fps">-</span></div>
            </div>
            <div id="speech-bubble"></div>
            <div id="error-msg"></div>
            <div id="debug-log" style="position:absolute;bottom:140px;left:8px;right:8px;max-height:150px;overflow-y:auto;background:rgba(0,0,0,0.85);border-radius:8px;padding:8px;font-size:11px;font-family:monospace;color:#0f0;display:none;z-index:99;white-space:pre-wrap;"></div>
            <button id="debug-btn" onclick="document.getElementById('debug-log').style.display=document.getElementById('debug-log').style.display==='none'?'block':'none'" style="position:absolute;bottom:140px;right:8px;background:#333;color:#aaa;border:none;border-radius:6px;padding:4px 8px;font-size:10px;z-index:100;cursor:pointer;">🔧</button>
        </div>
        <div id="chat-area">
            <div id="chat-log"></div>
            <div id="input-area">
                <input type="text" id="chat-input" placeholder="Say something..." autocomplete="off" disabled />
                <button id="send-btn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.10/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

    <script>
    (function() {
        const $ = id => document.getElementById(id);
        const debugLog = $("debug-log");
        function showError(msg) { $("error-msg").textContent=msg; $("error-msg").style.display="block"; dlog("ERROR: "+msg); }
        function dlog(msg) {
            console.log("[DBG]", msg);
            const line = document.createElement("div");
            line.textContent = new Date().toLocaleTimeString() + " " + msg;
            debugLog.appendChild(line);
            if (debugLog.childNodes.length > 50) debugLog.removeChild(debugLog.firstChild);
            debugLog.scrollTop = debugLog.scrollHeight;
        }

        if (!window.PIXI) return showError("PixiJS failed to load");
        if (!window.Live2DCubismCore) return showError("CubismCore failed to load");
        if (!window.PIXI.live2d) return showError("pixi-live2d-display failed to load");
        dlog("Libraries OK");

        const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const WS_URL = `${wsProto}//${location.host}/ws`;
        const MODEL_URL = "/models/Hiyori/Hiyori.model3.json";

        const EMOJIS = { neutral:"😐",happy:"😊",amused:"😂",surprised:"😲",sad:"😢",thinking:"🤔",excited:"🤩",empathetic:"🥺",angry:"😤" };

        const EMOTION_PARAMS = {
            neutral: {},
            happy: { "ParamMouthForm":1,"ParamEyeLSmile":0.7,"ParamEyeRSmile":0.7,"ParamBrowLY":0.3,"ParamBrowRY":0.3 },
            amused: { "ParamMouthForm":1,"ParamMouthOpenY":0.4,"ParamEyeLSmile":0.9,"ParamEyeRSmile":0.9,"ParamAngleZ":-5 },
            surprised: { "ParamBrowLY":1,"ParamBrowRY":1,"ParamEyeLOpen":1.3,"ParamEyeROpen":1.3,"ParamMouthOpenY":0.6,"ParamMouthForm":-0.3 },
            sad: { "ParamBrowLY":-0.8,"ParamBrowRY":-0.8,"ParamMouthForm":-0.6,"ParamEyeLOpen":0.6,"ParamEyeROpen":0.6,"ParamAngleY":-5 },
            thinking: { "ParamBrowLY":-0.3,"ParamBrowRY":0.5,"ParamEyeLOpen":0.7,"ParamEyeROpen":0.8,"ParamAngleX":15,"ParamAngleY":5 },
            excited: { "ParamMouthForm":1,"ParamMouthOpenY":0.5,"ParamEyeLSmile":1,"ParamEyeRSmile":1,"ParamBrowLY":0.8,"ParamBrowRY":0.8,"ParamBodyAngleX":3 },
            empathetic: { "ParamBrowLY":-0.5,"ParamBrowRY":-0.3,"ParamMouthForm":0.3,"ParamEyeLOpen":0.7,"ParamEyeROpen":0.7,"ParamAngleX":-5 },
            angry: { "ParamBrowLY":-1,"ParamBrowRY":-1,"ParamMouthForm":-0.8,"ParamEyeLOpen":0.9,"ParamEyeROpen":0.9,"ParamAngleX":-3 }
        };

        const DEFS = {"ParamMouthForm":0,"ParamMouthOpenY":0,"ParamEyeLOpen":1,"ParamEyeROpen":1,"ParamEyeLSmile":0,"ParamEyeRSmile":0,"ParamBrowLY":0,"ParamBrowRY":0,"ParamAngleX":0,"ParamAngleY":0,"ParamAngleZ":0,"ParamBodyAngleX":0,"ParamBreath":0};

        let ws=null, model=null, pixiApp=null;
        let curParams={...DEFS}, tgtParams={...DEFS};
        let isPlaying=false, audioCtx=null, analyser=null;
        let fpsN=0, fpsT=performance.now();
        let blinkTimer=3+Math.random()*4, blinkPhase=-1, blinkProg=0;
        let breathT=0, swayT=0, curEmotion="neutral";

        // ===== AUDIO (init on first user tap for mobile) =====
        function ensureAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                analyser.connect(audioCtx.destination);
                dlog("AudioContext created, state=" + audioCtx.state);
            }
            if (audioCtx.state === "suspended") {
                audioCtx.resume().then(() => dlog("AudioContext resumed"));
            }
        }
        // Unlock audio on ANY user interaction (critical for mobile Safari)
        document.addEventListener("touchstart", ensureAudio, { once: true });
        document.addEventListener("click", ensureAudio, { once: true });

        // ===== LIVE2D =====
        async function initLive2D() {
            const c = $("avatar-container");
            try {
                pixiApp = new PIXI.Application({
                    view: $("live2d-canvas"), resizeTo: c,
                    backgroundAlpha: 0, antialias: true,
                });
                dlog("PIXI app OK");
            } catch(e) { return showError("PIXI failed: " + e.message); }

            $("avatar-loading").innerHTML = '<div class="spinner"></div>Loading model...';

            try {
                model = await PIXI.live2d.Live2DModel.from(MODEL_URL, { autoInteract: false });
                dlog("Model loaded: " + model.width + "x" + model.height);

                // Scale & position
                const sx = c.clientWidth / model.width * 0.6;
                const sy = c.clientHeight / model.height * 0.85;
                const s = Math.min(sx, sy);
                model.scale.set(s);
                model.anchor?.set(0.5, 0.5);
                model.x = c.clientWidth / 2;
                model.y = c.clientHeight / 2;
                pixiApp.stage.addChild(model);
                $("avatar-loading").style.display = "none";
                dlog("Model on stage, scale=" + s.toFixed(3));

                // FIX #1: Kill the motion manager so it stops overriding our params
                try {
                    const im = model.internalModel;
                    // Stop all current motions
                    if (im.motionManager) {
                        im.motionManager.stopAllMotions();
                        // Prevent new motions from starting
                        im.motionManager.update = () => true;
                        dlog("Motion manager disabled");
                    }
                    // Also kill the expression manager if it exists
                    if (im.motionManager?.expressionManager) {
                        im.motionManager.expressionManager.update = () => true;
                        dlog("Expression manager disabled");
                    }
                } catch(e) {
                    dlog("Motion kill warning: " + e.message);
                }

                // FIX #2: Hook into the model's update cycle to inject our params
                // pixi-live2d-display calls model.update() on each PIXI tick
                const origUpdate = model.internalModel.updateWebGLContext;

                // Use the PIXI.Ticker to run our logic each frame
                pixiApp.ticker.add(() => {
                    const now = performance.now();
                    const dt = Math.min(pixiApp.ticker.deltaMS / 1000, 0.1);

                    // Calculate our params
                    updateExpression(dt);
                    updateIdle(dt);
                    updateLipSync();

                    // Write params directly to the Cubism model
                    writeParams();
                });
                dlog("Ticker hooked");

                // Discover params
                discoverParams();

            } catch(e) {
                showError("Model load: " + e.message);
                $("avatar-loading").innerHTML = '<div style="color:#f66">Failed: ' + e.message + '</div>';
            }
        }

        // ===== PARAMETER ACCESS =====
        let paramMap = null; // name → index
        let paramArr = null; // Float32Array of values

        function discoverParams() {
            if (!model?.internalModel?.coreModel) { dlog("No coreModel!"); return; }
            const core = model.internalModel.coreModel;

            // Method 1: Cubism 4 _model.parameters
            if (core._model?.parameters) {
                const p = core._model.parameters;
                paramMap = {};
                paramArr = p.values;
                for (let i = 0; i < p.count; i++) paramMap[p.ids[i]] = i;
                dlog("Params via _model (" + p.count + "): " + Object.keys(paramMap).slice(0,5).join(",") + "...");
                return;
            }

            // Method 2: Try to find params through prototype
            const proto = Object.getOwnPropertyNames(Object.getPrototypeOf(core));
            dlog("coreModel proto: " + proto.join(","));
            dlog("coreModel keys: " + Object.keys(core).join(","));

            // Method 3: Brute force - try setParameterValueById
            try {
                core.setParameterValueById("ParamAngleX", 30);
                dlog("setParameterValueById works!");
                paramMap = "useSetById";
                return;
            } catch(e) {}

            dlog("WARNING: No param access method found!");
        }

        function writeParams() {
            if (!paramMap) return;

            if (paramMap === "useSetById") {
                // Fallback method
                const core = model.internalModel.coreModel;
                for (const [name, val] of Object.entries(curParams)) {
                    try { core.setParameterValueById(name, val); } catch(e) {}
                }
                return;
            }

            // Direct Float32Array write (fastest)
            for (const [name, val] of Object.entries(curParams)) {
                const idx = paramMap[name];
                if (idx !== undefined) paramArr[idx] = val;
            }
        }

        // ===== EXPRESSION =====
        function applyEmotion(em) {
            curEmotion = em;
            tgtParams = {...DEFS, ...(EMOTION_PARAMS[em] || {})};
            dlog("Emotion → " + em);
        }

        function updateExpression(dt) {
            const f = 1 - Math.pow(0.01, dt);
            for (const p of Object.keys(DEFS)) {
                const t = tgtParams[p] ?? DEFS[p];
                const c = curParams[p] ?? DEFS[p];
                curParams[p] = c + (t - c) * f;
            }
        }

        // ===== IDLE =====
        function updateIdle(dt) {
            breathT += dt * 2.5;
            curParams["ParamBreath"] = Math.sin(breathT) * 0.5 + 0.5;

            // Blink
            blinkTimer -= dt;
            if (blinkTimer <= 0 && blinkPhase < 0) {
                blinkPhase = 0; blinkProg = 0;
                blinkTimer = 2.5 + Math.random() * 4;
            }
            if (blinkPhase >= 0) {
                blinkProg += dt * 10;
                let v = blinkProg < 1 ? 1 - blinkProg : blinkProg < 2 ? blinkProg - 1 : 1;
                if (blinkProg >= 2) blinkPhase = -1;
                curParams["ParamEyeLOpen"] = v * (tgtParams["ParamEyeLOpen"] ?? 1);
                curParams["ParamEyeROpen"] = v * (tgtParams["ParamEyeROpen"] ?? 1);
            }

            // Head sway
            if (curEmotion === "neutral") {
                swayT += dt * 0.4;
                curParams["ParamAngleX"] = (tgtParams["ParamAngleX"] ?? 0) + Math.sin(swayT) * 3;
                curParams["ParamAngleZ"] = (tgtParams["ParamAngleZ"] ?? 0) + Math.sin(swayT * 0.7) * 2;
            }
        }

        // ===== LIP SYNC =====
        async function playAudio(b64) {
            ensureAudio();
            isPlaying = true;
            $("status-dot").className = "dot speaking";
            $("status-text").textContent = "Speaking";
            try {
                const bin = atob(b64);
                const buf = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
                const ab = await audioCtx.decodeAudioData(buf.buffer.slice(0)); // slice for Safari
                const src = audioCtx.createBufferSource();
                src.buffer = ab;
                src.connect(analyser);
                src.start(0);
                dlog("Audio playing, duration=" + ab.duration.toFixed(1) + "s");
                src.onended = () => {
                    isPlaying = false;
                    $("status-dot").className = "dot connected";
                    $("status-text").textContent = "Live";
                    tgtParams["ParamMouthOpenY"] = 0;
                    dlog("Audio ended");
                };
            } catch(e) {
                dlog("Audio err: " + e.message);
                isPlaying = false;
                $("status-dot").className = "dot connected";
                $("status-text").textContent = "Live";
            }
        }

        function updateLipSync() {
            if (!isPlaying || !analyser) return;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            let sum = 0;
            for (let i = 2; i < 30; i++) sum += data[i];
            const mouth = Math.min(1.0, (sum / 28) / 100);
            // Lip sync overrides mouth param directly (not through lerp)
            curParams["ParamMouthOpenY"] = mouth;
        }

        // ===== WEBSOCKET =====
        function connectWS() {
            dlog("WS → " + WS_URL);
            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                dlog("WS open");
                $("status-dot").className = "dot connected";
                $("status-text").textContent = "Live";
                $("chat-input").disabled = false;
                $("send-btn").disabled = false;
            };
            ws.onmessage = e => {
                const d = JSON.parse(e.data);
                dlog("WS ← " + d.type + (d.emotion ? " ["+d.emotion+"]":"") + (d.text ? " "+d.text.substring(0,25)+"..." : ""));

                if (d.type === "thinking") {
                    $("status-dot").className = "dot thinking";
                    $("status-text").textContent = "Thinking...";
                    $("emotion-badge").textContent = "🤔";
                    applyEmotion("thinking");
                }
                if (d.type === "response") {
                    $("emotion-badge").textContent = EMOJIS[d.emotion] || "😐";
                    $("dbg-llm").textContent = d.latency?.llm_ms || "-";
                    $("dbg-tts").textContent = d.latency?.tts_ms || "-";

                    // Speech bubble
                    $("speech-bubble").textContent = d.text;
                    $("speech-bubble").classList.add("visible");
                    setTimeout(() => $("speech-bubble").classList.remove("visible"), 8000);

                    // Chat log
                    addMsg("AI", d.text, d.emotion);

                    // Expression
                    applyEmotion(d.emotion || "neutral");

                    // Audio
                    if (d.audio) {
                        dlog("Audio data: " + d.audio.length + " chars");
                        playAudio(d.audio);
                    } else {
                        dlog("No audio in response!");
                    }
                }
            };
            ws.onclose = () => {
                dlog("WS closed");
                $("status-dot").className = "dot";
                $("status-text").textContent = "Reconnecting...";
                $("chat-input").disabled = true;
                $("send-btn").disabled = true;
                setTimeout(connectWS, 3000);
            };
            ws.onerror = () => dlog("WS error");
        }

        // ===== CHAT =====
        function sendChat() {
            const t = $("chat-input").value.trim();
            if (!t || !ws || ws.readyState !== 1) return;
            ensureAudio(); // unlock audio on send (user gesture)
            ws.send(JSON.stringify({ type: "chat", text: t }));
            dlog("Sent: " + t);
            addMsg("You", t);
            $("chat-input").value = "";
            $("chat-input").disabled = true;
            $("send-btn").disabled = true;
            const unlock = () => {
                $("chat-input").disabled = false;
                $("send-btn").disabled = false;
                $("chat-input").focus();
                ws.removeEventListener("message", onR);
            };
            const onR = e => { if (JSON.parse(e.data).type === "response") unlock(); };
            ws.addEventListener("message", onR);
            setTimeout(unlock, 15000);
        }

        function addMsg(who, text, em) {
            const d = document.createElement("div"); d.className = "chat-msg";
            const cls = who === "You" ? "user" : "ai";
            const tag = em ? `<span class="etag">[${em}]</span>` : "";
            d.innerHTML = `<span class="${cls}">${who}:</span> <span class="text">${text.replace(/</g,"&lt;")}</span>${tag}`;
            $("chat-log").appendChild(d);
            $("chat-log").scrollTop = $("chat-log").scrollHeight;
        }

        $("chat-input").addEventListener("keydown", e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); }});
        $("send-btn").addEventListener("click", sendChat);

        // ===== FPS =====
        setInterval(() => { $("dbg-fps").textContent = fpsN; fpsN = 0; }, 1000);

        // ===== INIT =====
        initLive2D().then(() => connectWS());
    })();
    </script>
</body>
</html>
